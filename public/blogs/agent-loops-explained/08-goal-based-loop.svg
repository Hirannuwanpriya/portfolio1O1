<svg viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" width="680" height="220" font-family="sans-serif">
  <rect width="680" height="220" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow8" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#6B7280" />
    </marker>
  </defs>
  <rect x="30" y="80" width="140" height="55" rx="8" fill="#FFFFFF" stroke="#111418" stroke-width="2"/>
  <text x="100" y="105" text-anchor="middle" font-size="12" fill="#111418" font-weight="600">Goal:</text>
  <text x="100" y="120" text-anchor="middle" font-size="10" fill="#6B7280">"tests pass"</text>

  <rect x="250" y="80" width="140" height="55" rx="8" fill="#FFFFFF" stroke="#3498DB" stroke-width="2"/>
  <text x="320" y="112" text-anchor="middle" font-size="13" fill="#111418" font-weight="600">Agent turn</text>

  <rect x="470" y="80" width="160" height="55" rx="8" fill="#FFFFFF" stroke="#7D3C98" stroke-width="2"/>
  <text x="550" y="105" text-anchor="middle" font-size="12" fill="#111418" font-weight="600">Checker model</text>
  <text x="550" y="121" text-anchor="middle" font-size="10" fill="#6B7280">condition met?</text>

  <line x1="170" y1="107" x2="248" y2="107" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow8)"/>
  <line x1="390" y1="107" x2="468" y2="107" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow8)"/>
  <path d="M470,150 C420,190 280,190 250,150" fill="none" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow8)"/>
  <text x="360" y="205" text-anchor="middle" font-size="11" fill="#6B7280">no → another turn (within a budget)</text>
  <rect x="500" y="10" width="130" height="40" rx="6" fill="#111418"/>
  <text x="565" y="35" text-anchor="middle" font-size="11" fill="#FFFFFF">yes → stop &amp; report</text>
  <line x1="565" y1="50" x2="565" y2="78" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow8)"/>
</svg>
