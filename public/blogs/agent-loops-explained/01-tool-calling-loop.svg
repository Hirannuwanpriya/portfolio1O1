<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" width="700" height="200" font-family="sans-serif">
  <rect width="700" height="200" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#6B7280" />
    </marker>
  </defs>
  <rect x="20" y="70" width="130" height="55" rx="8" fill="#F8F8F6" stroke="#111418" stroke-width="2"/>
  <text x="85" y="102" text-anchor="middle" font-size="13" fill="#111418" font-weight="600">Task in</text>

  <rect x="220" y="70" width="130" height="55" rx="8" fill="#FFFFFF" stroke="#3498DB" stroke-width="2"/>
  <text x="285" y="102" text-anchor="middle" font-size="13" fill="#111418" font-weight="600">Pick a tool</text>

  <rect x="420" y="70" width="130" height="55" rx="8" fill="#FFFFFF" stroke="#3498DB" stroke-width="2"/>
  <text x="485" y="102" text-anchor="middle" font-size="13" fill="#111418" font-weight="600">Run it</text>

  <rect x="600" y="70" width="80" height="55" rx="8" fill="#111418"/>
  <text x="640" y="102" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="600">Out</text>

  <line x1="150" y1="97" x2="218" y2="97" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="350" y1="97" x2="418" y2="97" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="550" y1="97" x2="598" y2="97" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow1)"/>
  <path d="M485,125 C485,165 285,165 285,125" fill="none" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="385" y="180" text-anchor="middle" font-size="11" fill="#6B7280">loop until goal met</text>
</svg>
